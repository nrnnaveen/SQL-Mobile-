<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Table View</title>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a href="/dashboard" class="navbar-brand">PocketDB</a>

</div>

</nav>

<div class="container mt-4">

<h4>Table: {{table}}</h4>

<div class="card p-3 mb-4">

<h5>Insert Row</h5>

<form method="post" action="/insert/{{table}}">

<div class="row">

{% for col in columns %}

<div class="col-6 mb-2">

<input name="{{col}}" class="form-control" placeholder="{{col}}">

</div>

{% endfor %}

</div>

<button class="btn btn-success mt-2">Insert</button>

</form>

</div>

<div class="card p-3">

<h5>Rows</h5>

<table class="table table-bordered">

<tr>

{% for c in columns %}

<th>{{c}}</th>

{% endfor %}

<th>Action</th>

</tr>

{% for row in data %}

<tr>

{% for cell in row %}

<td>{{cell}}</td>

{% endfor %}

<td>

<a href="/delete/{{table}}/{{loop.index}}" class="btn btn-danger btn-sm" onclick="return confirm('Delete row?')">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>

</html>
